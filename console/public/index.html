<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmally Console</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #151520;
            --border: #252535;
            --accent: #007bff;
            --text: #e0e0e0;
            --success: #28a745;
            --danger: #dc3545;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: var(--panel);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }
        .top-section {
            display: flex;
            flex: 6; /* Proporción para la parte superior */
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }
        .left-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid var(--border);
            background: #11111a;
            overflow-y: auto;
        }
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .terminal-section {
            flex: 4; /* Proporción para la consola */
            display: flex;
            flex-direction: column;
            background: #000;
            padding: 15px 20px;
            overflow: hidden;
        }
        h2 {
            margin-top: 0;
            font-size: 15px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #json-editor {
            flex: 1;
            background: #1e1e2e;
            color: #d1d1d1;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        .terminal-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #050505;
            border: 1px solid #222;
            border-radius: 4px;
        }
        #terminal {
            flex: 1;
            color: #00ff00;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .command-input-group {
            display: flex;
            background: #111;
            border-top: 1px solid #222;
            padding: 5px;
        }
        .command-input-group span {
            color: #00ff00;
            padding: 8px 10px;
            font-family: monospace;
            font-weight: bold;
        }
        #command-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            font-family: monospace;
            outline: none;
            font-size: 14px;
        }
        .buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-apply { background: var(--success); color: white; }
        .btn-refresh { background: #444; color: white; }
        .btn-save-tpl { background: #6f42c1; color: white; }
        .btn-logout { background: var(--danger); color: white; }
        
        .template-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .template-card h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: white;
        }
        .template-card p {
            margin: 0 0 10px 0;
            font-size: 11px;
            color: #888;
            line-height: 1.3;
        }
        .template-actions {
            display: flex;
            gap: 5px;
        }
        .template-actions button {
            padding: 4px 8px;
            font-size: 10px;
            flex: 1;
        }
        .btn-load { background: var(--accent); color: white; }
        .btn-del { background: #444; color: white; }
        .btn-mass { background: #e67e22; color: white; }

        .mass-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0a0a0f;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            border: 1px solid var(--border);
        }
        .mass-row .player-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }
        .mass-row .player-name {
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .mass-row .player-meta {
            display: flex;
            gap: 12px;
        }
        .mass-row .player-id {
            color: #666;
            font-size: 11px;
        }
        .mass-row .player-score {
            color: #888;
            font-size: 11px;
        }
        .mass-row .player-input-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .mass-row input {
            width: 120px;
            padding: 6px 8px;
            background: #151520;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            text-align: right;
            font-family: monospace;
            font-size: 14px;
        }
        .mass-row button {
            margin-left: 8px;
            padding: 6px 10px;
            font-size: 11px;
        }
        .mass-list-container {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        #mass-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            border: 1px solid var(--border);
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            background: #0a0a0f;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        #status-msg { margin-left: 10px; font-size: 13px; font-weight: bold; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <h1 style="margin:0; font-size: 18px;">SIGMALLY <span style="color:var(--accent)">CONSOLE</span></h1>
        <div style="display: flex; align-items: center;">
            <span id="status-msg"></span>
            <a href="/logout"><button class="btn-logout" style="margin-left: 15px;">SALIR</button></a>
        </div>
    </header>

    <div class="main-container">
        <div class="top-section">
            <div class="left-panel">
                <h2>Templates</h2>
                <div id="templates-list">
                    <!-- Templates aquí -->
                </div>
            </div>

            <div class="editor-container">
                <h2>Configuración del Servidor (JSON)</h2>
                <textarea id="json-editor" spellcheck="false"></textarea>
                <div class="buttons">
                    <button class="btn-apply" onclick="applySettings()">APLICAR AL SERVER</button>
                    <button class="btn-refresh" onclick="loadSettings()">RECARGAR JSON</button>
                    <button class="btn-save-tpl" onclick="showSaveModal()">GUARDAR TEMPLATE</button>
                </div>
            </div>
        </div>

        <div class="terminal-section">
            <h2>
                <span>Consola del Servidor</span>
                <span style="display: flex; align-items: center; gap: 8px;">
                    <button class="btn-mass" style="padding: 3px 8px; font-size: 10px;" onclick="showMassModal()">GESTIONAR MASAS</button>
                    <span style="font-size: 10px; color: #555;">Logs en tiempo real</span>
                </span>
            </h2>
            <div class="terminal-wrapper">
                <div id="terminal">Conectando con logs...</div>
                <div class="command-input-group">
                    <span>></span>
                    <input type="text" id="command-input" placeholder="Escribe un comando (ej: players, mass 1 1000, addbot 0 10)..." autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Guardar Template -->
    <div id="modal">
        <div class="modal-content">
            <h2 style="color: white;">Guardar Template</h2>
            <input type="text" id="tpl-id" placeholder="ID del archivo (ej: modo_guerra)">
            <input type="text" id="tpl-name" placeholder="Nombre visible (ej: Configuración de Guerra)">
            <textarea id="tpl-desc" placeholder="Descripción de este modo..."></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button style="background: #444; color: white;" onclick="closeModal()">CANCELAR</button>
                <button class="btn-apply" onclick="saveTemplate()">GUARDAR</button>
            </div>
        </div>
    </div>

    <!-- Modal Gestionar Masas -->
    <div id="mass-modal" style="display: none;">
        <div class="modal-content" style="width: 500px;">
            <h2 style="color: white;">Gestionar Masas de Jugadores</h2>
            <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                <button class="btn-refresh" onclick="loadPlayersForMass()" style="flex: 1;">REFRESCAR JUGADORES</button>
            </div>
            <div class="mass-list-container" id="mass-list">
                <p style="color: #666; font-size: 13px;">Pulsa "Refrescar Jugadores" para cargar la lista...</p>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button style="background: #444; color: white;" onclick="closeMassModal()">CERRAR</button>
            </div>
        </div>
    </div>

    <script>
        async function loadSettings() {
            const res = await fetch('/api/settings');
            if (res.status === 401) window.location.href = '/login.html';
            const settings = await res.json();
            document.getElementById('json-editor').value = JSON.stringify(settings, null, 4);
        }

        async function loadTemplates() {
            const res = await fetch('/api/templates');
            const templates = await res.json();
            const list = document.getElementById('templates-list');
            list.innerHTML = templates.map(t => `
                <div class="template-card">
                    <h3>${t.name}</h3>
                    <p>${t.desc}</p>
                    <div class="template-actions">
                        <button class="btn-load" onclick="loadTemplateIntoEditor('${t.id}')">EDITAR</button>
                        <button class="btn-apply" onclick="applyTemplate('${t.id}')">USAR</button>
                        <button class="btn-del" onclick="deleteTemplate('${t.id}')" title="Eliminar">X</button>
                    </div>
                </div>
            `).join('');
        }

        async function applySettings() {
            const editor = document.getElementById('json-editor');
            const status = document.getElementById('status-msg');
            try {
                const settings = JSON.parse(editor.value);
                status.innerText = "Sincronizando...";
                status.style.color = "yellow";
                
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                
                if (res.ok) {
                    status.innerText = "¡Sincronizado!";
                    status.style.color = "#28a745";
                    setTimeout(() => status.innerText = "", 3000);
                }
            } catch (e) {
                alert("Error en el JSON: " + e.message);
            }
        }

        // Ejecutar comandos manuales
        const cmdInput = document.getElementById('command-input');
        let commandHistory = [];
        let historyIndex = -1;

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (commandHistory.length > 0 && historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = commandHistory[commandHistory.length - 1 - historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    cmdInput.value = commandHistory[commandHistory.length - 1 - historyIndex];
                } else {
                    historyIndex = -1;
                    cmdInput.value = '';
                }
            } else if (e.key === 'Enter' && cmdInput.value.trim()) {
                const command = cmdInput.value.trim();
                cmdInput.value = '';
                commandHistory.push(command);
                historyIndex = -1;
                
                try {
                    await fetch('/api/command', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command })
                    });
                } catch (err) {
                    console.error("Error enviando comando:", err);
                }
            }
        });

        function showSaveModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function saveTemplate() {
            const id = document.getElementById('tpl-id').value;
            const name = document.getElementById('tpl-name').value;
            const desc = document.getElementById('tpl-desc').value;
            const settings = JSON.parse(document.getElementById('json-editor').value);

            if (!id) return alert("ID Requerido");

            const res = await fetch('/api/templates/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, name, desc, settings })
            });

            if (res.ok) {
                closeModal();
                loadTemplates();
            }
        }

        async function loadTemplateIntoEditor(id) {
            const res = await fetch('/api/templates/' + id);
            const data = await res.json();
            delete data._template_name;
            delete data._template_desc;
            document.getElementById('json-editor').value = JSON.stringify(data, null, 4);
        }

        async function applyTemplate(id) {
            if (!confirm("¿Aplicar este template al servidor ahora mismo?")) return;
            const res = await fetch('/api/templates/' + id);
            const data = await res.json();
            document.getElementById('json-editor').value = JSON.stringify(data, null, 4);
            applySettings();
        }

        async function deleteTemplate(id) {
            if (!confirm("¿Borrar template?")) return;
            await fetch('/api/templates/' + id, { method: 'DELETE' });
            loadTemplates();
        }

        function updateLogs() {
            fetch('/api/logs').then(r => r.text()).then(t => {
                const term = document.getElementById('terminal');
                const wasAtBottom = term.scrollHeight - term.clientHeight <= term.scrollTop + 50;
                term.innerText = t;
                if (wasAtBottom) term.scrollTop = term.scrollHeight;
            }).catch(e => {});
        }

        function showMassModal() {
            document.getElementById('mass-modal').style.display = 'flex';
            loadPlayersForMass();
        }

        function closeMassModal() {
            document.getElementById('mass-modal').style.display = 'none';
        }

        function getDynamicStep(value) {
            if (value >= 500000) return 100000;
            if (value >= 100000) return 25000;
            if (value >= 50000) return 10000;
            if (value >= 10000) return 5000;
            if (value >= 5000) return 1000;
            if (value >= 1000) return 500;
            if (value >= 500) return 100;
            return 50;
        }

        async function loadPlayersForMass() {
            const list = document.getElementById('mass-list');
            try {
                list.innerHTML = '<p style="color: #666; font-size: 13px;">Cargando jugadores...</p>';
                const res = await fetch('/api/players', { method: 'POST' });
                const players = await res.json();
                if (players.length === 0) {
                    list.innerHTML = '<p style="color: #666; font-size: 13px;">No se encontraron jugadores. Asegúrate de que el servidor está corriendo.</p>';
                    return;
                }
                list.innerHTML = players.map(p => `
                    <div class="mass-row">
                        <div class="player-info">
                            <span class="player-name">${p.name}</span>
                            <div class="player-meta">
                                <span class="player-id">ID: ${p.id}</span>
                                <span class="player-score">Score: ${p.score}</span>
                            </div>
                        </div>
                        <div class="player-input-group">
                            <input type="number" id="mass-input-${p.id}" placeholder="Masa" min="0" step="100">
                            <button class="btn-apply" onclick="setPlayerMass(${p.id})">APLICAR</button>
                        </div>
                    </div>
                `).join('');
                players.forEach(p => {
                    const input = document.getElementById(`mass-input-${p.id}`);
                    input.addEventListener('wheel', (e) => {
                        e.preventDefault();
                        const current = parseFloat(input.value) || 0;
                        const step = getDynamicStep(current);
                        input.value = Math.max(0, Math.round(e.deltaY < 0 ? current + step : current - step));
                        input.step = step;
                    });
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                            e.preventDefault();
                            const current = parseFloat(input.value) || 0;
                            let step = getDynamicStep(current);
                            if (e.shiftKey) step *= 10;
                            input.value = Math.max(0, Math.round(e.key === 'ArrowUp' ? current + step : current - step));
                            input.step = step;
                        }
                    });
                    input.addEventListener('input', () => {
                        const current = parseFloat(input.value) || 0;
                        input.step = getDynamicStep(current);
                    });
                });
            } catch (err) {
                list.innerHTML = '<p style="color: #dc3545; font-size: 13px;">Error al cargar jugadores.</p>';
            }
        }

        async function setPlayerMass(playerId) {
            const input = document.getElementById(`mass-input-${playerId}`);
            const mass = input.value.trim();
            if (!mass || isNaN(mass)) return;
            try {
                await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: `mass ${playerId} ${mass}` })
                });
                input.style.borderColor = '#28a745';
                setTimeout(() => input.style.borderColor = '', 1000);
            } catch (err) {
                input.style.borderColor = '#dc3545';
                setTimeout(() => input.style.borderColor = '', 1000);
            }
        }

        loadSettings();
        loadTemplates();
        setInterval(updateLogs, 2000);
    </script>
</body>
</html>
